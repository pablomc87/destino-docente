<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="420" height="280" viewBox="0 0 420 280" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="mapGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="55%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="roofGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8f0fe"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fde047" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <filter id="drop" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1e3a5f" flood-opacity="0.2"/>
    </filter>
    <filter id="pinShadow" x="-40%" y="-20%" width="180%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#7f1d1d" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Warm sun (reads on blue hero background) -->
  <circle cx="352" cy="42" r="52" fill="url(#sunGrad)"/>
  <circle cx="352" cy="42" r="14" fill="#facc15" fill-opacity="0.9"/>

  <!-- Clouds -->
  <g fill="#ffffff" fill-opacity="0.88">
    <ellipse cx="72" cy="48" rx="28" ry="14"/>
    <ellipse cx="92" cy="48" rx="22" ry="12"/>
    <ellipse cx="52" cy="50" rx="18" ry="10"/>
    <ellipse cx="300" cy="28" rx="22" ry="11"/>
    <ellipse cx="316" cy="28" rx="16" ry="9"/>
  </g>

  <!-- Map base -->
  <rect x="16" y="168" width="388" height="98" rx="18" fill="url(#mapGrad)" stroke="#ffffff" stroke-width="2" stroke-opacity="0.55" filter="url(#drop)"/>
  <!-- Map grid (subtle) -->
  <g stroke="#2563eb" stroke-opacity="0.12" stroke-width="1">
    <line x1="40" y1="188" x2="380" y2="188"/>
    <line x1="40" y1="218" x2="380" y2="218"/>
    <line x1="40" y1="248" x2="380" y2="248"/>
    <line x1="80" y1="176" x2="80" y2="258"/>
    <line x1="200" y1="176" x2="200" y2="258"/>
    <line x1="320" y1="176" x2="320" y2="258"/>
  </g>
  <!-- Map "roads" -->
  <path d="M32 232 Q120 210 200 232 T380 220" stroke="#ffffff" stroke-opacity="0.65" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M48 252 L180 200 L340 246" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Ruta en el mapa hasta el colegio -->
  <path d="M 312 228 Q 255 188 210 170 Q 192 162 178 158" stroke="#f59e0b" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-dasharray="7 6" stroke-opacity="0.95"/>

  <!-- Trees -->
  <g filter="url(#drop)">
    <rect x="58" y="198" width="8" height="22" rx="1" fill="#78350f"/>
    <circle cx="62" cy="192" r="16" fill="#22c55e"/>
    <circle cx="54" cy="198" r="12" fill="#16a34a"/>
    <circle cx="70" cy="198" r="11" fill="#4ade80"/>
  </g>
  <g filter="url(#drop)">
    <rect x="354" y="202" width="7" height="20" rx="1" fill="#78350f"/>
    <circle cx="358" cy="196" r="14" fill="#22c55e"/>
    <circle cx="352" cy="202" r="10" fill="#4ade80"/>
  </g>

  <!-- School building (base alineada con el mapa y=168) -->
  <g filter="url(#drop)">
    <ellipse cx="178" cy="168" rx="62" ry="8" fill="#1e40af" fill-opacity="0.18"/>
    <rect x="118" y="104" width="120" height="64" rx="3" fill="url(#wallGrad)" stroke="#1d4ed8" stroke-width="1.5" stroke-opacity="0.45"/>
    <path d="M118 104 L178 54 L238 104 Z" fill="url(#roofGrad)" stroke="#1e3a8a" stroke-width="1.2" stroke-opacity="0.5"/>
    <rect x="166" y="38" width="24" height="70" rx="1" fill="url(#wallGrad)" stroke="#1d4ed8" stroke-width="1.3" stroke-opacity="0.4"/>
    <path d="M162 38 L194 38 L178 20 Z" fill="#1e40af"/>
    <circle cx="178" cy="64" r="11" fill="#ffffff" stroke="#3b82f6" stroke-width="1.2"/>
    <line x1="178" y1="64" x2="178" y2="56" stroke="#1d4ed8" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="178" y1="64" x2="184" y2="66" stroke="#1d4ed8" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Windows with shine -->
    <rect x="130" y="118" width="26" height="22" rx="2" fill="url(#glassGrad)" stroke="#2563eb" stroke-width="1" stroke-opacity="0.35"/>
    <rect x="134" y="120" width="8" height="6" rx="1" fill="#ffffff" fill-opacity="0.65"/>
    <line x1="143" y1="118" x2="143" y2="140" stroke="#1e40af" stroke-opacity="0.25"/>
    <line x1="130" y1="129" x2="156" y2="129" stroke="#1e40af" stroke-opacity="0.25"/>
    <rect x="200" y="118" width="26" height="22" rx="2" fill="url(#glassGrad)" stroke="#2563eb" stroke-width="1" stroke-opacity="0.35"/>
    <rect x="204" y="120" width="8" height="6" rx="1" fill="#ffffff" fill-opacity="0.65"/>
    <line x1="213" y1="118" x2="213" y2="140" stroke="#1e40af" stroke-opacity="0.25"/>
    <line x1="200" y1="129" x2="226" y2="129" stroke="#1e40af" stroke-opacity="0.25"/>
    <!-- Door -->
    <path d="M166 168 V142 Q178 134 190 142 V168 H166Z" fill="#1e3a8a"/>
    <circle cx="184" cy="158" r="2" fill="#fbbf24"/>
    <!-- Flag -->
    <line x1="228" y1="104" x2="228" y2="74" stroke="#ffffff" stroke-width="2" stroke-opacity="0.9" stroke-linecap="round"/>
    <path d="M228 74 L228 88 L252 81 L228 74 Z" fill="#f97316"/>
  </g>

  <!-- Marcador de mapa (tu ubicación / destino en el mapa) -->
  <g filter="url(#pinShadow)">
    <path d="M312 158 C297 158 286 171 286 186 C286 200 312 232 312 232 C312 232 338 200 338 186 C338 171 327 158 312 158Z" fill="#ef4444"/>
    <ellipse cx="312" cy="176" rx="14" ry="12" fill="#fca5a5" fill-opacity="0.45"/>
    <circle cx="312" cy="174" r="10" fill="#ffffff"/>
    <circle cx="312" cy="174" r="4.5" fill="#1d4ed8"/>
  </g>
</svg>
