{% extends "schools/base.html" %}

{% block title %}Restablecer contraseña completado - Destino Docente{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body p-5">
                    <h2 class="text-center mb-4">Contraseña cambiada</h2>
                    <p class="text-muted text-center mb-4">
                        Tu contraseña ha sido cambiada. Puedes iniciar sesión ahora.
                    </p>
                    
                    <div class="text-center">
                        <a href="{% url 'users:signin' %}" class="btn btn-primary">Iniciar sesión</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
