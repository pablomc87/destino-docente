{% extends 'schools/base.html' %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-3 col-lg-2">
            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="mb-4">
                        <p class="mb-0 small text-truncate">{{ user.email }}</p>
                        <small class="text-muted">Desde {{ user.date_joined|date:"M Y" }}</small>
                    </div>
                    
                    <div class="list-group list-group-flush">
                        <a href="{% url 'users:profile' %}" class="list-group-item list-group-item-action {% if request.resolver_match.url_name == 'profile' %}active{% endif %}">
                            <i class="fas fa-user me-2"></i> Perfil
                        </a>
                        <a href="{% url 'users:dashboard' %}" class="list-group-item list-group-item-action {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                            <i class="fas fa-tachometer-alt me-2"></i> Actividad
                        </a>
                        <a href="{% url 'users:settings' %}" class="list-group-item list-group-item-action {% if request.resolver_match.url_name == 'settings' %}active{% endif %}">
                            <i class="fas fa-cog me-2"></i> Ajustes
                        </a>
                        <a href="{% url 'users:signout' %}" class="list-group-item list-group-item-action text-danger">
                            <i class="fas fa-sign-out-alt me-2"></i> Salir
                        </a>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="col-md-9 col-lg-10">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert {% if message.tags == 'error' %}alert-danger{% else %}alert-success{% endif %} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
            
            {% block user_content %}{% endblock %}
        </div>
    </div>
</div>
{% endblock %}
