{{- if and .Values.backup.enabled .Values.postgresql.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-pg-backups
  labels:
    {{- include "destino-docente.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.backup.size }}
  {{- if .Values.backup.storageClass }}
  storageClassName: {{ .Values.backup.storageClass }}
  {{- end }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-postgresql-backup
  labels:
    {{- include "destino-docente.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: {{ include "destino-docente.name" . }}
            app.kubernetes.io/instance: {{ .Release.Name }}
            app.kubernetes.io/component: backup
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pg-dump
              image: docker.io/library/postgres:18-alpine
              imagePullPolicy: IfNotPresent
              env:
                - name: PGHOST
                  value: {{ printf "%s-postgresql" .Release.Name | quote }}
                - name: PGUSER
                  value: postgres
                - name: PGDATABASE
                  value: {{ .Values.postgresql.auth.database | quote }}
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.postgresql.auth.existingSecret }}
                      key: {{ .Values.postgresql.auth.secretKeys.adminPasswordKey }}
              command:
                - /bin/bash
                - -ec
                - |
                  STAMP=$(date +%Y%m%d-%H%M)
                  OUT="/backups/${PGDATABASE}-${STAMP}.dump"
                  pg_dump --format=custom --no-owner --no-acl -f "$OUT"
                  echo "Wrote $OUT"
                  find /backups -name '*.dump' -mtime +{{ .Values.backup.retentionDays }} -delete || true
              volumeMounts:
                - name: backups
                  mountPath: /backups
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: {{ .Release.Name }}-pg-backups
{{- end }}
